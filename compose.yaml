# Fire-and-forget vault-storage deployment.
#
# Usage:
#   cp .env.example .env       # set VAULT_API_TOKEN + paths
#   docker compose up -d
#   docker compose logs -f
#
# The container watches /data for markdown changes and reindexes incrementally.
# Bearer-token auth is required on every request — set a strong VAULT_API_TOKEN
# (generate with `openssl rand -hex 32`).

services:
  vault-storage:
    build:
      context: .
    image: vault-storage:latest
    # Run as host uid/gid so files written by the container (DB, frontmatter
    # writes via PUT) land with ownership the host user can edit. Defaults to
    # 1000:1000 (matches the base image's `node` user); override in .env when
    # the host user has a different uid.
    user: "${VAULT_UID:-1000}:${VAULT_GID:-1000}"
    container_name: vault-storage
    restart: unless-stopped
    ports:
      # Default: bind on all interfaces so remote machines can reach the API.
      # If you only want LAN/local access, change to "127.0.0.1:8123:8123" or
      # "${LAN_IP}:8123:8123" and use Tailscale / a reverse proxy for remote.
      - "${VAULT_PUBLISH_HOST:-0.0.0.0}:${VAULT_PORT:-8123}:8123"
    env_file:
      - .env
    environment:
      # These override .env for paths that must be container-relative.
      VAULT_DATA_PATH: /data
      HF_HOME: /home/node/.cache/huggingface
      # glibc malloc tuning. Node spawns many threads (libuv pool, ORT, sqlite,
      # watcher); glibc gives each its own arena (default cap 8×CPU) and never
      # returns freed chunks to the OS once an arena has grown — common cause
      # of "RSS climbs across container lifecycles." MALLOC_ARENA_MAX=2 caps the
      # arena count; MALLOC_TRIM_THRESHOLD_ pins the auto-trim point at 128 KB
      # so freed allocations above that size flow back to the OS. Pairs with
      # the BgeEmbedder Retainer (which handles the ORT session arena) — the
      # Retainer covers direct mmap'd allocations, these knobs cover glibc
      # arena residue.
      MALLOC_ARENA_MAX: 2
      MALLOC_TRIM_THRESHOLD_: 131072
    volumes:
      # Markdown source-of-truth tree. Read-write — the server's PUT /sections
      # endpoint writes here, and the watcher detects external edits.
      - "${VAULT_DATA_PATH_HOST}:/data"
      # Persist the BGE model cache so container restarts don't re-download.
      - vault-hf-cache:/home/node/.cache/huggingface
    healthcheck:
      test:
        - CMD-SHELL
        - 'wget -q -O - --header="Authorization: Bearer $$VAULT_API_TOKEN" http://127.0.0.1:8123/system/status || exit 1'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    labels:
      - homepage.group=Hosted
      - homepage.name=Vault Storage
      # Set VAULT_HOMEPAGE_HREF in .env to your reachable URL, e.g.
      # `http://croc.lan:8123/ui/`. The default points at the dashboard
      # served from this container; the GitHub URL fallback is the
      # placeholder for fresh checkouts.
      - homepage.href=${VAULT_HOMEPAGE_HREF:-https://github.com/uhop/vault-storage}
      - homepage.description=AI-agent vault — markdown indexed with embeddings + typed edges; REST + MCP

volumes:
  vault-hf-cache:
