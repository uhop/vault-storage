name: Publish MCP tarball

on:
  push:
    tags:
      - 'mcp-*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '26'

      - name: Pack MCP
        working-directory: mcp
        run: |
          tag="${GITHUB_REF_NAME}"            # e.g. mcp-0.0.1
          version="${tag#mcp-}"               # 0.0.1
          npm version --no-git-tag-version --allow-same-version "$version"
          cp ../LICENSE LICENSE
          npm pack
          # The scoped package packs as uhop-vault-storage-mcp-*.tgz; keep the
          # historical unscoped asset name — install-mcp.sh builds it from the
          # version, uniformly across pre- and post-scoping releases.
          mv uhop-vault-storage-mcp-*.tgz "vault-storage-mcp-${version}.tgz"
          ls -la vault-storage-mcp-*.tgz

      - name: Create release & attach tarball
        uses: softprops/action-gh-release@v3
        with:
          files: mcp/vault-storage-mcp-*.tgz
          name: MCP ${{ github.ref_name }}
          body: |
            `vault-storage-mcp` ${{ github.ref_name }}

            Install on any machine (no GitHub auth required):

            ```bash
            curl -fsSL https://raw.githubusercontent.com/uhop/vault-storage/main/scripts/install-mcp.sh | sh
            ```

            Pin a specific version:

            ```bash
            curl -fsSL https://raw.githubusercontent.com/uhop/vault-storage/main/scripts/install-mcp.sh | sh -s -- --version ${{ github.ref_name }}
            ```
