<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<script>(()=>{const t=localStorage.getItem('vault.theme');if(t==='light'||t==='dark')document.documentElement.dataset.theme=t;})();</script>
<title>vault-storage — lint review</title>
<link rel="icon" type="image/svg+xml" href="/ui/favicon.svg">
<link rel="icon" sizes="any" href="/favicon.ico">
<link rel="stylesheet" href="/ui/theme.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg); color: var(--fg);
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  header { display: flex; align-items: baseline; gap: 1rem; padding: .8rem 1rem; border-bottom: 1px solid var(--line); }
  header h1 { font-size: 1.05rem; margin: 0; font-weight: 600; }
  header nav { display: flex; gap: .8rem; font-size: .9rem; }
  header nav a { color: var(--muted); text-decoration: none; }
  header nav a[aria-current] { color: var(--fg); }
  header .spacer { flex: 1; }
  main { padding: 1rem; max-width: 60rem; margin: 0 auto; }
  h2 { font-size: 1rem; margin: 1.4rem 0 .6rem; }
  h2:first-child { margin-top: 0; }
  h2 .count { color: var(--muted); font-weight: 400; font-size: .85em; }
  button { padding: .5rem 1rem; border: 1px solid var(--line); background: var(--card); color: var(--fg); border-radius: 4px; cursor: pointer; font: inherit; }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.danger { background: var(--bad); color: #fff; border-color: var(--bad); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .section { background: var(--card); border: 1px solid var(--line); border-radius: 6px; padding: .8rem 1rem; margin-bottom: 1rem; }
  .section .why { color: var(--muted); font-size: .85rem; margin-bottom: .8rem; }
  .section .why code { font-family: var(--mono); font-size: .85em; }
  table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  th, td { text-align: left; padding: .35rem .5rem; vertical-align: top; }
  th { font-weight: 600; color: var(--muted); border-bottom: 1px solid var(--line); }
  tbody tr { border-bottom: 1px solid var(--line); }
  tbody tr:last-child { border-bottom: none; }
  td.id, td.path { font-family: var(--mono); font-size: .82rem; word-break: break-all; }
  td.path a { color: var(--accent); text-decoration: none; }
  td.path a:hover { text-decoration: underline; }
  td.stamp { font-family: var(--mono); font-size: .82rem; color: var(--muted); white-space: nowrap; }
  td.stamp.bad { color: var(--bad); }
  .actions { margin-top: .8rem; display: flex; gap: .5rem; align-items: center; }
  .actions .selected-count { color: var(--muted); font-size: .85rem; margin-right: auto; }
  .empty { color: var(--muted); padding: 2rem 1rem; text-align: center; font-size: .95rem; }
  .err { color: var(--bad); padding: .8rem 1rem; background: var(--card); border: 1px solid var(--bad); border-radius: 6px; margin-bottom: 1rem; }
  .ok { color: var(--ok); padding: .6rem 1rem; background: var(--card); border: 1px solid var(--line); border-radius: 6px; margin-bottom: 1rem; font-size: .9rem; }
  .spinner { display: inline-block; width: .9em; height: .9em; border: 2px solid var(--line); border-top-color: var(--muted); border-radius: 50%; animation: spin .8s linear infinite; vertical-align: -.15em; }
  @keyframes spin { to { transform: rotate(360deg); } }
  dialog { border: 1px solid var(--line); border-radius: 8px; padding: 1.2rem; background: var(--card); color: var(--fg); max-width: 24rem; }
  dialog::backdrop { background: rgba(0,0,0,.5); }
  dialog h2 { margin: 0 0 .8rem; font-size: 1.05rem; }
  dialog p { color: var(--muted); margin: 0 0 .8rem; font-size: .9rem; }
  dialog input { width: 100%; padding: .5rem; font-family: var(--mono); border: 1px solid var(--line); border-radius: 4px; background: var(--bg); color: var(--fg); }
  dialog .row { display: flex; gap: .5rem; justify-content: flex-end; margin-top: .8rem; }
  .footer { color: var(--muted); font-size: .8rem; padding: 1rem; text-align: center; font-family: var(--mono); }
</style>
</head>
<body>
<header>
  <h1>vault-storage</h1>
  <nav>
    <a href="/ui/">dashboard</a>
    <a href="/ui/search.html">search</a>
    <a href="/ui/projects.html">projects</a>
    <a href="/ui/tags.html">tags</a>
    <a href="/ui/raw.html">raw</a>
    <a href="/ui/folder.html">browse</a>
    <a href="/ui/note.html">note</a>
  </nav>
  <div class="spacer"></div>
  <div id="theme-toggle"></div>
  <button id="settings" title="Settings">⚙</button>
</header>
<main>
  <div id="status"></div>
  <div id="content"><div class="empty"><span class="spinner"></span> loading lint…</div></div>
</main>
<div class="footer" id="footer"></div>

<dialog id="auth-dlg">
  <h2>API token</h2>
  <p>Paste the bearer token (<code>VAULT_API_TOKEN</code>). Stored in your browser's localStorage.</p>
  <input id="auth-input" type="password" autocomplete="off" spellcheck="false">
  <div class="row">
    <button id="auth-cancel">Cancel</button>
    <button id="auth-ok" class="primary">Save</button>
  </div>
</dialog>

<script type="module">
import {api, apiJson, getToken, setToken} from '/ui/api.js';
const $ = sel => document.querySelector(sel);
const $$ = sel => document.querySelectorAll(sel);

const esc = s => String(s).replace(/[<>&"']/g, c => ({ '<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;' })[c]);

const showStatus = (kind, msg) => {
  const el = $('#status');
  if (!kind) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="${kind}">${msg}</div>`;
};

const showAuthDialog = () => {
  const dlg = $('#auth-dlg');
  $('#auth-input').value = getToken();
  dlg.showModal();
  $('#auth-input').focus();
};

const renderEmpty = () => {
  $('#content').innerHTML = `<div class="empty">Lint is clean. Nothing to review.</div>`;
};

const renderDangling = (samples, total) => {
  if (samples.length === 0) return '';
  const moreNote = total > samples.length
    ? `<div class="why">Showing ${samples.length} of ${total}; refresh after deleting to see the next batch.</div>`
    : '';
  const rows = samples.map((s, i) => `
    <tr>
      <td><input type="checkbox" data-alias="${esc(s.id)}" id="alias-${i}"></td>
      <td class="id"><label for="alias-${i}">${esc(s.id)}</label></td>
      <td class="id">${esc(s.canonical)}</td>
    </tr>
  `).join('');
  return `
    <section class="section" data-section="aliases">
      <h2>Dangling tag aliases <span class="count">(${samples.length})</span></h2>
      <div class="why">
        Aliases pointing to a canonical tag that's missing from the taxonomy. The alias was authored
        manually — pick which to drop. Server check: each selected alias is verified as still dangling
        before <code>DELETE</code>; live aliases are skipped.
      </div>
      <table>
        <thead><tr><th style="width:2rem"></th><th>alias</th><th>canonical (missing)</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      ${moreNote}
      <div class="actions">
        <span class="selected-count" id="aliases-selected">0 selected</span>
        <button id="aliases-toggle">Select all</button>
        <button id="aliases-delete" class="danger" disabled>Delete selected</button>
      </div>
    </section>
  `;
};

const renderTemporal = (samples, total) => {
  // Filter to the updated<created subset; future-stamp samples are auto-
  // fixed by the dashboard's "Clean now" button (cleanup-lint endpoint).
  const nowIso = new Date().toISOString();
  const reviewable = samples.filter(s =>
    !((s.created && s.created > nowIso) || (s.updated && s.updated > nowIso))
    && s.updated && s.created && s.updated < s.created
  );
  if (reviewable.length === 0) return '';
  const moreNote = total > samples.length
    ? `<div class="why">Showing ${samples.length} of ${total} samples (capped server-side); future-stamp samples are not shown here — fix via dashboard "Clean now".</div>`
    : '';
  const rows = reviewable.map(s => `
    <tr>
      <td class="id">${esc(s.id)}</td>
      <td class="path"><a href="/ui/note.html?path=${encodeURIComponent(s.file_path)}">${esc(s.file_path)}</a></td>
      <td class="stamp">${esc(s.created ?? '—')}</td>
      <td class="stamp bad">${esc(s.updated ?? '—')}</td>
    </tr>
  `).join('');
  return `
    <section class="section" data-section="temporal">
      <h2>Temporal anomalies — <code>updated &lt; created</code> <span class="count">(${reviewable.length})</span></h2>
      <div class="why">
        Frontmatter has <code>updated</code> earlier than <code>created</code>. Often manual paste
        error; sometimes a write-bug worth investigating. Open each note and fix the FM directly —
        no auto-fix endpoint, since re-stamping could mask the underlying cause.
      </div>
      <table>
        <thead><tr><th>record_id</th><th>file_path</th><th>created</th><th>updated</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      ${moreNote}
    </section>
  `;
};

const updateAliasSelectionState = () => {
  const checks = $$('[data-alias]');
  const selected = [...checks].filter(c => c.checked).length;
  $('#aliases-selected').textContent = `${selected} selected`;
  $('#aliases-delete').disabled = selected === 0;
  const allSelected = selected === checks.length && checks.length > 0;
  $('#aliases-toggle').textContent = allSelected ? 'Select none' : 'Select all';
};

const wireAliasSection = () => {
  if (!$('[data-section="aliases"]')) return;
  $$('[data-alias]').forEach(c => c.addEventListener('change', updateAliasSelectionState));
  $('#aliases-toggle').addEventListener('click', () => {
    const checks = [...$$('[data-alias]')];
    const allSelected = checks.every(c => c.checked);
    checks.forEach(c => { c.checked = !allSelected; });
    updateAliasSelectionState();
  });
  $('#aliases-delete').addEventListener('click', deleteSelectedAliases);
  updateAliasSelectionState();
};

const deleteSelectedAliases = async () => {
  const aliases = [...$$('[data-alias]:checked')].map(c => c.dataset.alias);
  if (aliases.length === 0) return;
  const btn = $('#aliases-delete');
  const original = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'deleting…';
  try {
    const result = await apiJson('/maintenance/cleanup-tag-aliases', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({aliases})
    });
    const parts = [`deleted ${result.deleted.length}`];
    if (result.notDangling.length) parts.push(`skipped ${result.notDangling.length} live`);
    if (result.missing.length) parts.push(`${result.missing.length} not found`);
    showStatus('ok', `Tag aliases: ${parts.join(', ')}.`);
    await refresh();
  } catch (e) {
    if (e.message === 'unauthorized' || e.message === 'no-token') { showAuthDialog(); return; }
    showStatus('err', `Failed to delete aliases: ${esc(e.message)}`);
    btn.disabled = false;
    btn.textContent = original;
  }
};

const refresh = async () => {
  if (!getToken()) { showAuthDialog(); return; }
  $('#content').innerHTML = `<div class="empty"><span class="spinner"></span> loading lint…</div>`;
  let lint;
  try {
    lint = await apiJson('/system/lint');
  } catch (e) {
    if (e.message === 'unauthorized' || e.message === 'no-token') { showAuthDialog(); return; }
    $('#content').innerHTML = `<div class="err">Failed to read /system/lint: ${esc(e.message)}</div>`;
    return;
  }

  const dangling = lint.checks?.dangling_tag_aliases?.samples ?? [];
  const danglingTotal = lint.checks?.dangling_tag_aliases?.count ?? 0;
  const temporal = lint.checks?.temporal_anomalies?.samples ?? [];
  const temporalTotal = lint.checks?.temporal_anomalies?.count ?? 0;
  const html = renderDangling(dangling, danglingTotal) + renderTemporal(temporal, temporalTotal);

  if (!html) {
    renderEmpty();
    $('#footer').textContent = `lint clean${lint.total_issues ? ' for these categories (other categories auto-fixable via dashboard)' : ''}`;
    return;
  }
  $('#content').innerHTML = html;
  wireAliasSection();
  $('#footer').textContent = `${lint.total_issues} total lint issues; ${danglingTotal} dangling aliases, ${temporalTotal} temporal anomalies`;
};

$('#settings').addEventListener('click', showAuthDialog);
$('#auth-cancel').addEventListener('click', () => $('#auth-dlg').close());
$('#auth-ok').addEventListener('click', () => {
  setToken($('#auth-input').value.trim());
  $('#auth-dlg').close();
  refresh();
});
$('#auth-input').addEventListener('keydown', e => { if (e.key === 'Enter') $('#auth-ok').click(); });

refresh();
</script>
<script type="module" src="/ui/theme.js"></script>
</body>
</html>
